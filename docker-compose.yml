version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: hotel_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student -d hotel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  hotel-service:
    build: ./backend/hotel-service
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://student:12345@postgres:5432/hotel_db

  auth-service:
    build: ./backend/auth-service
    ports:
      - "5002:5002"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://student:12345@postgres:5432/hotel_db

  reservation-service:
    build: ./backend/reservation-service
    ports:
      - "5003:5003"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://student:12345@postgres:5432/hotel_db

  notification-service:
    build: ./backend/notification-service
    ports:
      - "5004:5004"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://student:12345@postgres:5432/hotel_db

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - hotel-service
      - auth-service
      - reservation-service
      - notification-service

volumes:
  postgres_data: